<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Bistro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    color:#f5f5f5;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee")
        no-repeat center center/cover;
    z-index:-1;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(0,0,0,0.5);
}

.logo{
    background:#f9e802;
    color:#141413;
    padding:6px 18px;
    border-radius:8px;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:10px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:12px;
}

nav ul li a{
    text-decoration:none;
}

.nav-btn{
    background:linear-gradient(to bottom,#ffd700,#e6b800);
    color:black;
    padding:6px 14px;
    border-radius:10px;
    font-weight:bold;
    font-size:14px;
    box-shadow:0 4px 10px rgba(255,215,0,0.5);
    transition:0.3s;
}

.nav-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(255,215,0,0.8);
}

.hero{
    height:85vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:50px;
    letter-spacing:2px;
}

.hero p{
    font-size:18px;
    margin:15px 0;
    color:#dddddd;
}

.btn{
    padding:10px 22px;
    background:#ffd700;
    color:black;
    border:none;
    font-size:16px;
    cursor:pointer;
    border-radius:6px;
    transition:0.3s;
}

.btn:hover{
    background:white;
    transform:scale(1.05);
}

@media(max-width:768px){
    nav{
        flex-direction:column;
        gap:10px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:16px;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">
        <i class="fas fa-utensils"></i>
        Saffron Bistro
    </div>

    <ul>
        <li><a href="Home.html"><div class="nav-btn">🏠 Home</div></a></li>
        <li><a href="Search.html"><div class="nav-btn">🔍 Search</div></a></li>
        <li><a href="Menu.html"><div class="nav-btn">📋 Menu</div></a></li>
        <li><a href="About.html"><div class="nav-btn">ℹ️ About</div></a></li>
        <li><a href="Contact.html"><div class="nav-btn">📞 Contact</div></a></li>
    </ul>
</nav>

<div class="hero">
    <h1>Welcome to Saffron Bistro</h1>
    <p>Experience the Taste of Authentic Flavours</p>
    <button onclick="window.location.href='./Menu.html'" class="btn">
        View Menu
    </button>
</div>

</body>
</html>
