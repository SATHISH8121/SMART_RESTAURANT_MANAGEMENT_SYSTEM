<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Gateway - Saffron Bistro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:linear-gradient(135deg,#111,#222);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* PAYMENT BOX */
.payment-box{
background:#1c1c1c;
width:380px;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(255,215,0,0.3);
animation:fade .6s ease-in-out;
}

@keyframes fade{
from{opacity:0; transform:translateY(30px)}
to{opacity:1; transform:translateY(0)}
}

h2{
text-align:center;
color:#ffd700;
margin-bottom:20px;
}

label{
font-size:14px;
color:#ccc;
}

input, select{
width:100%;
padding:10px;
margin:6px 0 14px;
border:none;
border-radius:6px;
background:#333;
color:white;
}

input:focus{
outline:none;
box-shadow:0 0 5px #ffd700;
}

.row{
display:flex;
gap:10px;
}

.pay-btn{
width:100%;
padding:12px;
background:#ffd700;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.pay-btn:hover{
background:white;
}

.secure{
text-align:center;
margin-top:12px;
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div class="payment-box">

<h2>💳 Payment Gateway</h2>

<label>Card Holder Name</label>
<input type="text" id="name" placeholder="Enter name on card">

<label>Card Number</label>
<input type="text" id="card" maxlength="16" placeholder="1234 5678 9012 3456">

<div class="row">
<div style="flex:1">
<label>Expiry</label>
<input type="text" id="exp" maxlength="5" placeholder="MM/YY">
</div>

<div style="flex:1">
<label>CVV</label>
<input type="password" id="cvv" maxlength="3" placeholder="123">
</div>
</div>

<label>Payment Method</label>
<select id="method">
<option>Credit Card</option>
<option>Debit Card</option>
<option>UPI</option>
<option>Net Banking</option>
</select>

<button class="pay-btn" onclick="processPayment()">Pay Securely</button>

<div class="secure">🔒 100% Secure Payments</div>

</div>

<script>
function processPayment(){

let name=document.getElementById("name").value;
let card=document.getElementById("card").value;
let exp=document.getElementById("exp").value;
let cvv=document.getElementById("cvv").value;

if(name==""||card==""||exp==""||cvv==""){
alert("⚠ Please fill all payment details");
return;
}

if(card.length<16){
alert("⚠ Invalid Card Number");
return;
}

alert("✅ Payment Successful!\nThank you for ordering from Saffron Bistro");

setTimeout(()=>{
window.location.href="ThankYou.html";
},1500);

}
</script>

</body>
</html>
