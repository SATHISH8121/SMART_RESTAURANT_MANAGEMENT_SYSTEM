<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
color:white;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee")
no-repeat center center/cover;

z-index:-1;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.6);
position:sticky;
top:0;
}

.logo{
color:#ffd700;
font-size:22px;
font-weight:bold;
}
nav ul{
display:flex;
gap:12px;
list-style:none;
}

.nav-btn{
background:linear-gradient(#ffd700,#e6b800);
color:black;
padding:6px 16px;
border-radius:12px;
font-weight:bold;
font-size:14px;
box-shadow:0 4px 10px rgba(255,215,0,0.6);
transition:.3s;
}

.nav-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(255,215,0,0.9);
}

.search{
text-align:center;
margin:30px;
}

.search input{
padding:8px;
width:250px;
}

.search button{
padding:8px 12px;
background:#ffd700;
border:none;
cursor:pointer;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#1c1c1c;
padding:15px;
text-align:center;
border-radius:10px;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ffd700;
}

.card img{
width:150px;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#ffd700;
margin:10px;
}

button{
padding:6px 12px;
background:#ffd700;
border:none;
cursor:pointer;
}
.cartBtn{
position:fixed;
right:20px;
bottom:20px;
background:#ffd700;
padding:15px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

.cart{
position:fixed;
top:0;
right:-350px;
width:350px;
height:100%;
background:#222;
padding:20px;
transition:.4s;
overflow-y:auto;
}

.cart.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.qty button{
margin-left:5px;
}

.checkout{
background:#ffd700;
padding:10px;
width:100%;
margin-top:20px;
}

</style>
</head>

let cart=[];

function displayFoods(list){

let menu=document.getElementById("menu");
menu.innerHTML="";

list.forEach(food=>{

menu.innerHTML+=`

<div class="card">
<h3>${food.name}</h3>
<img src="${food.img}">
<div class="price">₹${food.price}</div>
<button onclick="addToCart('${food.name}',${food.price})">Add</button>
</div>

`;

});

}

displayFoods(foods);


function searchFood(){

let text=document.getElementById("searchInput").value.toLowerCase();

let result=foods.filter(food =>
food.name.toLowerCase().includes(text)
);

displayFoods(result);

}


function addToCart(name,price){

let item=cart.find(i=>i.name===name);

if(item){item.qty++;}
else{cart.push({name,price,qty:1});}

renderCart();

}


function renderCart(){

let list=document.getElementById("cartItems");
list.innerHTML="";

let total=0;

cart.forEach(item=>{

total+=item.price*item.qty;

list.innerHTML+=`

<div class="cart-item">

${item.name}

<div class="qty">

<button onclick="changeQty('${item.name}',-1)">-</button>
${item.qty}
<button onclick="changeQty('${item.name}',1)">+</button>
<button onclick="removeItem('${item.name}')">x</button>

</div>

</div>

`;

});

document.getElementById("total").innerText=total;

}


function changeQty(name,val){

let item=cart.find(i=>i.name===name);

item.qty+=val;

if(item.qty<=0){
removeItem(name);
}

renderCart();

}


function removeItem(name){

cart=cart.filter(i=>i.name!==name);

renderCart();

}


function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}


function checkout(){

if(cart.length==0){
alert("Cart is empty");
return;
}

alert("🎉 Order placed successfully!");

cart=[];
renderCart();

}
