<!DOCTYPE html>
<html>
<head>

<title>Thank You</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{

animation:fade 2s ease-in-out;

}

h1{
color:#ffd700;
font-size:40px;
}

p{
margin-top:15px;
font-size:20px;
}

button{
margin-top:25px;
padding:10px 20px;
background:#ffd700;
border:none;
cursor:pointer;
font-size:16px;
}

@keyframes fade{

from{opacity:0; transform:translateY(50px);}

to{opacity:1; transform:translateY(0);}

}

</style>

</head>

<body>

<div class="box">

<h1>🙏 Thank You!</h1>

<p>Thank you for visiting <b>Saffron Bistro</b></p>

<p>Your order has been placed successfully.</p>

<p>We hope to see you again soon!</p>

<button onclick="location.href='Home.html'">Visit Again</button>

</div>

</body>
</html>
